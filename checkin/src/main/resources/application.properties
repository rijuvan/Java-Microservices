server.port=8070

# ActiveMQ Classic broker connection (default port 61616)
# Start ActiveMQ before launching this service: activemq start (or activemq.bat start on Windows)
# Admin console: http://localhost:8161 (admin/admin)
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
